<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post | IT Blogs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="{{ url_for('index') }}">IT<span>Blogs</span></a>
    <div class="navbar-links">
        <a href="{{ url_for('home') }}">All Posts</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="form-card">
        <h1>Edit Post</h1>
        <p class="subtitle">Update the title or content below</p>

        <form method="POST">
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" value="{{ post.title }}" required>
            </div>
            <div class="form-group">
                <label>Content</label>
                <textarea name="content" rows="10" required>{{ post.content }}</textarea>
            </div>
            <div style="display:flex;gap:1rem;align-items:center;margin-top:0.5rem;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{{ url_for('view_post', post_id=post.id) }}" style="color:var(--text-muted);font-size:0.9rem;">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer">&copy; 2025 ITBlogs made by keshav</footer>
</body>
</html>
