<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | IT Blogs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="{{ url_for('index') }}">IT<span>Blogs</span></a>
    <div class="navbar-links">
        <a href="{{ url_for('sign_in') }}">Member Login</a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>🔐 Admin Login</h1>
        <p class="subtitle">Enter all 3 credentials to continue</p>

        {% if msg %}
            <div class="msg">{{ msg }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="admin@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>
            <div class="form-group">
                <label>Secret Word</label>
                <input type="password" name="secret_word" placeholder="Secret word" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Login as Admin</button>
        </form>

        <p class="switch"><a href="{{ url_for('sign_in') }}">← Back to member login</a></p>
    </div>
</div>

<footer class="footer">&copy; 2025 ITBlogs</footer>
</body>
</html>
